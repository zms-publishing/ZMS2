### #############################################################################
### Docker Compose configuration for ZMS2 on Ubuntu
### #############################################################################
### IMPORTANT: This file creates a basic multi-instanstance setup for ZMS2. 
### For debugging purposes, use `docker-compose.debug.yml` 
### file instead, which refers to a copy of production data.
### #############################################################################
x-instance-common: &instance_common
  image: zms2:ubuntu
  build:
    context: .
    dockerfile: ./Dockerfile
    args:
      - INSTANCE_DIR=${INSTANCE_DIR}
      - VENV_DIR=${VENV_DIR}
      - INSTANCE_MOUNT=${INSTANCE_MOUNT}
      - IS_DEBUG=false
      - UID=${UID}
      - GID=${GID}
  depends_on:
    - zeo
  user: zope
  volumes:
    - ${INSTANCE_MOUNT}/.vscode:${INSTANCE_DIR}/.vscode:rw
    # Mounting the instance directory allows to persist changes to the Zope instance configuration and data
    - ${INSTANCE_MOUNT}/bin:${INSTANCE_DIR}/bin:rw
    - ${INSTANCE_MOUNT}/etc:${INSTANCE_DIR}/etc:rw
    - ${INSTANCE_MOUNT}/var:${INSTANCE_DIR}/var:rw
    - ${INSTANCE_MOUNT}/log:${INSTANCE_DIR}/log:rw
    # To share external methods between Zope/ZEO/Docker clients folder needs to be mounted
    - ${INSTANCE_MOUNT}/Extensions:${INSTANCE_DIR}/Extensions:rw
    # Vendor folders
    - /home/zope/src/fonts:${INSTANCE_DIR}/vendor/fonts:rw
    - /home/zope/src/unify:${INSTANCE_DIR}/vendor/unify:rw
    # Source code
    - ${INSTANCE_MOUNT}/customizing:${INSTANCE_DIR}/customizing:rw
    - ${INSTANCE_MOUNT}/customizing/overrides.zcml:/home/zope/venv/lib/python2.7/site-packages/Products/zms/overrides.zcml:rw

  command: >
    bash -c "
      memcached -u zope -m 64 -p 11211 &
      ${INSTANCE_DIR}/bin/start_instance.sh &&
      sleep infinity
    "
  networks:
    - zms_network

networks:
  zms_network:
    driver: bridge


services:
  ### Zope: Zope Application Server
  instance1:
    <<: *instance_common
    environment:
      - PYTHONUNBUFFERED="1"
      - SOFTWARE_HOME="${VENV_DIR}/bin"
      - PYTHON="${VENV_DIR}/bin/python"
      - HTTP_PORT=8085
      - READ_ONLY=true
    ports:
      - "8085:8080"

  instance2:
    <<: *instance_common
    environment:
      - PYTHONUNBUFFERED="1"
      - SOFTWARE_HOME="${VENV_DIR}/bin"
      - PYTHON="${VENV_DIR}/bin/python"
      - HTTP_PORT=8086
      - READ_ONLY=false
    ports:
      - "8086:8080"

  instance3:
    <<: *instance_common
    environment:
      - PYTHONUNBUFFERED="1"
      - SOFTWARE_HOME="${VENV_DIR}/bin"
      - PYTHON="${VENV_DIR}/bin/python"
      - HTTP_PORT=8087
      - READ_ONLY=false
    ports:
      - "8087:8080"


  instance_debug:
    <<: *instance_common
    image: zms2:ubuntu-debug
    build:
      dockerfile: ./Dockerfile.debug
    environment:
      - PYTHONUNBUFFERED="1"
      - SOFTWARE_HOME="${VENV_DIR}/bin"
      - PYTHON="${VENV_DIR}/bin/python"
      - HTTP_PORT=8080
      - READ_ONLY=false
      - DB_HOST="host.docker.internal" # Use this to access the host's MariaDB server
      - DB_PORT="3306"
    ports:
      - "8080:8080" # Debug instance port, mapped to 8080 to avoid conflict with instance1
      - "8888:8888" # Code-server port
    ### HINT: VScode-Server will be started in the container automatically
    ### and can be accessed via the browser at http://localhost:8888
    ### The VSCode-Server will be started with the workspace and
    ### Zope Instance has be started manually with VSCode-Python Debugger
    command: >
      bash -c "
        memcached -u zope -m 64 -p 11211 &
        code-server --bind-addr 0.0.0.0:8888 --disable-telemetry --disable-update-check --user-data-dir /home/zope/.local/share/code-server --auth none ${INSTANCE_DIR}/.vscode/Docker.code-workspace
      "


  ### ZEO: Zope Enterprise Objects
  zeo:
    <<: *instance_common
    depends_on: []
    command: >
      bash -c "
      ${INSTANCE_DIR}/bin/start_zeo.sh &
      sleep infinity
      "


  ### MariaDB: Database server for ZMS2
  mariadb:
    image: mariadb:10.8.2
    container_name: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: zms_news
      MYSQL_USER: zms
      MYSQL_PASSWORD: zms
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - zms_network
volumes:
  mariadb_data:
    driver: local
